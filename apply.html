<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Application | TQ Wealth Hive</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-orange: #FF8C61;
            --soft-cream: #FFF9F3;
            --deep-clay: #4A3B33;
            --leaf-green: #88A47C;
            --text-grey: #6D5D55;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--soft-cream);
            color: var(--deep-clay);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            color: var(--warm-orange);
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 600;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-top: 20px; }
        p.subtitle { color: var(--text-grey); font-size: 1.1rem; }

        /* 身份选择切换器 */
        .identity-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .selector-btn {
            padding: 15px 30px;
            border: 2px solid var(--warm-orange);
            background: transparent;
            color: var(--warm-orange);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .selector-btn.active {
            background: var(--warm-orange);
            color: white;
        }

        /* 表单卡片样式 */
        .form-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(74, 59, 51, 0.08);
            display: none; /* 默认隐藏 */
        }

        .form-card.active { display: block; }

        .form-section { margin-bottom: 30px; }
        .form-section h3 {
            border-bottom: 2px solid var(--soft-cream);
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: var(--warm-orange);
            font-family: 'Playfair Display', serif;
        }

        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        
        label { font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        input, select, textarea {
            padding: 12px 15px;
            border: 1px solid #E0D7D0;
            border-radius: 8px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
        }

        input:focus { outline: 2px solid var(--warm-orange); border-color: transparent; }

        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin-top: 10px; }
        .checkbox-group input { width: auto; margin-top: 4px; }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--deep-clay);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .submit-btn:hover { background: var(--warm-orange); transform: translateY(-2px); }

        @media (max-width: 600px) { .grid-row { grid-template-columns: 1fr; } .form-card { padding: 30px 20px; } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo">TQ Wealth Hive</a>
            <h1>Membership Application</h1>
            <p class="subtitle">Join our generative ecosystem. Select your membership type below:</p>
        </header>

        <div class="identity-selector">
            <button class="selector-btn active" onclick="showForm('business')">Generative Business</button>
            <button class="selector-btn" onclick="showForm('community')">Community Organisation</button>
        </div>

        <div id="business-form" class="form-card active">
            <form action="#">
                <div class="form-section">
                    <h3>Business Identity</h3>
                    <div class="grid-row">
                        <div class="input-group">
                            <label>Registered Business Name *</label>
                            <input type="text" placeholder="e.g. Temple Quarter Bakery" required>
                        </div>
                        <div class="input-group">
                            <label>Business Registration Number</label>
                            <input type="text" placeholder="CRN or UTR">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Business Address (Must be in TQ Postcode)</label>
                        <textarea rows="2" placeholder="Street, Postcode"></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Generative Commitments</h3>
                    <div class="checkbox-group">
                        <input type="checkbox" required>
                        <label>We confirm we pay all staff at least the Real Living Wage.</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" required>
                        <label>We commit to sourcing at least 30% of our supplies locally within 2 years.</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox">
                        <label>We are interested in the Hive Community Funding program.</label>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Lead Contact</h3>
                    <div class="grid-row">
                        <input type="text" placeholder="Full Name" required>
                        <input type="email" placeholder="Work Email" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Submit Business Application</button>
            </form>
        </div>

        <div id="community-form" class="form-card">
            <form action="#">
                <div class="form-section">
                    <h3>Organisation Details</h3>
                    <div class="grid-row">
                        <div class="input-group">
                            <label>Organisation Name *</label>
                            <input type="text" placeholder="e.g. TQ Youth Gardeners" required>
                        </div>
                        <div class="input-group">
                            <label>Type of Organisation</label>
                            <select>
                                <option>Charity / NGO</option>
                                <option>Community Interest Company (CIC)</option>
                                <option>Informal Resident Group</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Impact Focus Area</h3>
                    <div class="grid-row">
                        <div class="checkbox-group"><input type="checkbox"><label>Social Connection</label></div>
                        <div class="checkbox-group"><input type="checkbox"><label>Environment</label></div>
                        <div class="checkbox-group"><input type="checkbox"><label>Mental Health</label></div>
                        <div class="checkbox-group"><input type="checkbox"><label>Education</label></div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Primary Objective</h3>
                    <div class="input-group">
                        <label>How will Hive membership support your mission?</label>
                        <textarea rows="4" placeholder="Briefly describe your community goals..."></textarea>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Submit Organisation Application</button>
            </form>
        </div>
    </div>

    <script>
        function showForm(type) {
            // 切换按钮状态
            document.querySelectorAll('.selector-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // 切换表单显示
            document.getElementById('business-form').classList.remove('active');
            document.getElementById('community-form').classList.remove('active');
            document.getElementById(type + '-form').classList.add('active');
        }
    </script>
</body>
</html>
